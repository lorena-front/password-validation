<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Validation ✨</title>
    <link rel="stylesheet" href="./assets/style.css">
    <link rel="shortcut icon" href="./assets/images/—Pngtree—shiny blue heart love symbol_8658930.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=check,close">

</head>
<body>
    <main>
        <div class="card">
            <h1>Strength Checker</h1>
            <label for="passwordInput">Enter your password:</label>
            <input type="password" autocomplete="off" name="passwordInput" id="passwordInput">
            <div class="strength-bar">
                <div id="strength-fill"></div>
            </div>
            <ul class="outputList">
                <li>At least 8 characters <span id="length" class="material-symbols-outlined">close</span></li>
                <li>Digits <span id="digit" class="material-symbols-outlined">close</span></li>
                <li>Uppercase <span id="uppercase" class="material-symbols-outlined">close</span></li>
                <li>Lowercase <span id="lowercase" class="material-symbols-outlined">close</span></li>
                <li>Special characters <span id="special" class="material-symbols-outlined">close</span></li>
                <li>Without repeated characters <span id="repeat" class="material-symbols-outlined">check</span></li>
                <li>Without spaces <span id="space" class="material-symbols-outlined">check</span></li>
            </ul>
        </div>
    </main>

    <!-- <p>
        Check how strong your password is <br>
        and see what it still needs ✨
    </p> -->
    
    <script src="./script.js"></script>
</body>
</html>
