<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Validation ✨</title>
    <link rel="stylesheet" href="./assets/style.css">
    <link rel="shortcut icon" href="./assets/images/—Pngtree—shiny blue heart love symbol_8658930.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
</head>
<body>
    <main>
        <div class="card">
            <label for="passwordInput">Enter your password:</label>
            <input type="text" name="passwordInput" id="passwordInput">
            <!-- <button type="button" onclick="passwordValidation()">Submit</button> -->
            <div class="outputContent"><p>Level: Zero</p></div>
            <ul class="outputList">
                <li id="length">At least 8 characters <span>❌</span></li>
                <li id="digit">Digits <span>❌</span></li>
                <li id="uppercase">Uppercase <span>❌</span></li>
                <li id="lowercase">Lowercase <span>❌</span></li>
                <li id="special">Special characters <span>❌</span></li>
                <li id="repeat">Without repeated characters <span>❌</span></li>
                <li id="space">Without spaces <span>❌</span></li>
            </ul>
        </div>
    </main>

    <!-- <p>
        Check how strong your password is <br>
        and see what it still needs ✨
    </p> -->
    
    <script src="./script.js"></script>
</body>
</html>
